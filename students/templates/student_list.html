{% extends 'home.html' %}

{% block content %}

<h1>Student List</h1>

<table border="1">
<tr>
<th>ID</th>
<th>Username</th>
<th>Name</th>
<th>Email</th>
<th>Mobile No</th>
</tr>

{% for student in students %}
<tr>
<td>{{ student.id }}</td>
<td>{{ student.username }}</td>
<td>{{ student.full_name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.mobile_No }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
